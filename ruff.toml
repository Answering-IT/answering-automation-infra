# Ruff configuration for answering-automation-infra
# Documentation: https://docs.astral.sh/ruff/configuration/

[lint]
# Enable recommended rules
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (let formatter handle it)
]

[lint.per-file-ignores]
# Scripts may have unused imports for testing
"scripts/*.py" = ["F401"]

[format]
# Use single quotes
quote-style = "double"
indent-style = "space"
line-ending = "auto"
