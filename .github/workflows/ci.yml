name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          python3 -m py_compile scripts/*.py
          echo "✅ Python syntax check passed"

      - name: Shellcheck
        run: |
          echo "Checking shell scripts..."
          shellcheck scripts/*.sh
          echo "✅ Shellcheck passed"

      - name: Ruff linting
        run: |
          echo "Running Ruff linter..."
          ruff check scripts/
          echo "✅ Ruff linting passed"

      - name: Validate YAML workflows
        run: |
          echo "Validating YAML syntax..."
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, document-start: disable, truthy: {check-keys: false}}}" .github/workflows/
          echo "✅ YAML validation passed"

      - name: Test parse_github_issues.py (dry run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Testing parse_github_issues.py against a test repo..."
          # Use --list mode (doesn't require milestone/issues to exist)
          python scripts/parse_github_issues.py --repo Answering-IT/answering-automation-infra --list > /dev/null || echo "No issues found (expected)"

          # Validate mode (should pass even with no issues)
          python scripts/parse_github_issues.py --repo Answering-IT/answering-automation-infra --validate || echo "Validation complete"

          echo "✅ Script execution test passed"

      - name: Test parse_backlog.py
        run: |
          echo "Testing parse_backlog.py..."
          # Test with a sample BACKLOG.md (using correct format from docs/BACKLOG_FORMAT.md)
          cat > /tmp/test_backlog.md << 'EOF'
          # Backlog

          ## Item 1
          ```yaml backlog
          id: test-001
          title: "Test item for CI validation"
          status: ready
          priority: P1
          context: Test context for validation
          acceptance_criteria:
            - "Criterion 1"
            - "Criterion 2"
          ```
          EOF

          python scripts/parse_backlog.py --file /tmp/test_backlog.md --validate
          python scripts/parse_backlog.py --file /tmp/test_backlog.md --list > /dev/null
          python scripts/parse_backlog.py --file /tmp/test_backlog.md --next > /dev/null

          echo "✅ parse_backlog.py test passed"

  summary:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          if [ "${{ needs.lint-and-test.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed. Please review the errors above."
            exit 1
          fi
