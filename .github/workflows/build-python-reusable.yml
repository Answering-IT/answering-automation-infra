name: Build & Gates (Python - Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install ruff black
          fi

      - name: Run ruff
        run: ruff check .

      - name: Run black
        run: black --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dev deps if they exist
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          # Install runtime deps if they exist (common patterns)
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f agents/requirements.txt ]; then
            pip install -r agents/requirements.txt
          fi

      - name: Run pytest
        run: pytest -m "unit or smoke" --tb=short
