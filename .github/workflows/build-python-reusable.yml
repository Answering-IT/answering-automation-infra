name: Build & Gates (Python - Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install ruff black
          fi

      - name: Run ruff
        run: ruff check .

      - name: Run black
        run: black --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dev deps if they exist
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          # Install runtime deps - check common patterns:
          #   - Top-level requirements.txt (single-app projects)
          #   - agents/requirements.txt (kb-rag-agent pattern)
          #   - infrastructure/lambdas/*/requirements.txt (CDK Lambda projects)
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f agents/requirements.txt ]; then
            pip install -r agents/requirements.txt
          fi
          # Find and install any Lambda function requirements (CDK projects)
          for req in $(find infrastructure/lambdas -name "requirements.txt" 2>/dev/null); do
            echo "Installing Lambda deps: $req"
            pip install -r "$req"
          done

      - name: Run pytest
        run: |
          # Run unit/smoke marked tests. If no tests are marked, exit cleanly
          # rather than failing — projects can adopt markers gradually.
          if pytest -m "unit or smoke" --collect-only -q 2>/dev/null | grep -q "test"; then
            pytest -m "unit or smoke" --tb=short
          else
            echo "::notice::No tests marked 'unit' or 'smoke' found — skipping pytest. Add @pytest.mark.unit or @pytest.mark.smoke to enable gating."
          fi
