name: Auto Maintain

# Reusable workflow that reads GitHub Issues (default) or BACKLOG.md (legacy),
# picks the next item, hands it to Claude via Bedrock, and opens a PR.
#
# Called by consumer repos via workflow_call. See README.md for usage.

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Specific issue number to implement (leave blank for --next)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Print the picked item and prompt, do not invoke Claude or open a PR'
        required: false
        type: boolean
        default: false
      language:
        description: 'Language/stack: python | typescript | go'
        required: true
        type: string
      use_github_issues:
        description: 'Use GitHub Issues instead of BACKLOG.md (default: true)'
        required: false
        type: boolean
        default: true
      milestone:
        description: 'Filter issues by milestone title (only when use_github_issues=true)'
        required: false
        type: string
        default: ''
      issue_label:
        description: 'Filter issues by label (only when use_github_issues=true)'
        required: false
        type: string
        default: ''
      bedrock_model:
        description: 'Bedrock model ID'
        required: false
        type: string
        default: 'us.anthropic.claude-sonnet-4-6'
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
      aws_role_arn:
        description: 'AWS IAM role ARN'
        required: false
        type: string
        default: 'arn:aws:iam::708819485463:role/GitHubActions-Answering-IT-SharedRole'
      bedrock_model_docs:
        description: 'Bedrock model for type:docs issues (used when sdd_mode=true)'
        required: false
        type: string
        default: 'us.anthropic.claude-haiku-4-5-20251001'
      bedrock_model_complex:
        description: 'Bedrock model for type:complex issues (used when sdd_mode=true)'
        required: false
        type: string
        default: 'us.anthropic.claude-opus-4-8'
    secrets:
      AUTO_MAINTAIN_APP_ID:
        required: true
      AUTO_MAINTAIN_APP_PRIVATE_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: false
      CLAUDE_ACCESS_TOKEN:
        description: 'Claude Pro OAuth token — preferred over Bedrock when set'
        required: false

permissions:
  id-token: write       # AWS OIDC
  contents: write       # commit + push branch
  pull-requests: write  # open PR
  issues: write         # claude-code-action may comment
  actions: read         # monitor-duration job queries job status

# One run at a time per repo — prevents concurrent PRs against the same backlog.
concurrency:
  group: auto-maintain-${{ github.repository }}
  cancel-in-progress: false

jobs:
  pick-item:
    name: Pick next work item
    runs-on: ubuntu-latest
    outputs:
      has_item: ${{ steps.pick.outputs.has_item }}
      item_id: ${{ steps.pick.outputs.item_id }}
      item_title: ${{ steps.pick.outputs.item_title }}
      item_json: ${{ steps.pick.outputs.item_json }}

    steps:
      - name: Validate caller
        run: |
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "Answering-IT" ]]; then
            echo "::error::Unauthorized caller: ${GITHUB_REPOSITORY_OWNER}"
            exit 1
          fi
          echo "✅ Caller validated: ${GITHUB_REPOSITORY}"

      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Unblock spec:waiting issues whose blocking PR merged
        if: inputs.use_github_issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PY'
          import json, re, subprocess

          result = subprocess.run(
              ['gh', 'issue', 'list', '--label', 'spec:waiting',
               '--json', 'number,body', '--limit', '50'],
              capture_output=True, text=True
          )
          issues = json.loads(result.stdout or '[]')

          for issue in issues:
              num  = issue['number']
              body = issue.get('body', '') or ''
              m    = re.search(r'(?i)(?:depends on|blocked by|requires)\s+#(\d+)', body)
              if not m:
                  print(f"#{num}: no dependency declared, restoring to spec:ready")
                  subprocess.run(['gh', 'issue', 'edit', str(num),
                                  '--remove-label', 'spec:waiting', '--add-label', 'spec:ready'])
                  continue
              blocker = m.group(1)
              r2 = subprocess.run(
                  ['gh', 'pr', 'list', '--search', f'closes #{blocker}',
                   '--state', 'open', '--json', 'number'],
                  capture_output=True, text=True
              )
              if not json.loads(r2.stdout or '[]'):
                  print(f"#{num}: #{blocker} merged — restoring to spec:ready")
                  subprocess.run(['gh', 'issue', 'edit', str(num),
                                  '--remove-label', 'spec:waiting', '--add-label', 'spec:ready'])
              else:
                  print(f"#{num}: still waiting for #{blocker}")
          PY

      - name: Download parser from central repo
        run: |
          if [ "${{ inputs.use_github_issues }}" = "true" ]; then
            echo "Using GitHub Issues parser"
            curl -sSL https://raw.githubusercontent.com/Answering-IT/answering-automation-infra/main/scripts/parse_github_issues.py -o parse_items.py
          else
            echo "Using BACKLOG.md parser"
            curl -sSL https://raw.githubusercontent.com/Answering-IT/answering-automation-infra/main/scripts/parse_backlog.py -o parse_items.py
            pip install pyyaml
          fi

      - name: Pick item
        id: pick
        env:
          OVERRIDE_ISSUE_NUMBER: ${{ inputs.issue_number }}
          USE_ISSUES: ${{ inputs.use_github_issues }}
          MILESTONE: ${{ inputs.milestone }}
          LABEL: ${{ inputs.issue_label }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${USE_ISSUES}" = "true" ]; then
            # GitHub Issues mode (default)
            FILTER_ARGS=""
            [ -n "${MILESTONE}" ] && FILTER_ARGS="${FILTER_ARGS} --milestone ${MILESTONE}"
            [ -n "${LABEL}" ] && FILTER_ARGS="${FILTER_ARGS} --label ${LABEL}"

            if [ -n "${OVERRIDE_ISSUE_NUMBER}" ]; then
              echo "Looking for explicit issue: #${OVERRIDE_ISSUE_NUMBER}"
              ITEM=$(python parse_items.py --list ${FILTER_ARGS} | python -c "
          import json, sys, os
          target = os.environ['OVERRIDE_ISSUE_NUMBER']
          items = json.load(sys.stdin)
          match = next((i for i in items if str(i.get('github_issue_ref', '')).lstrip('#') == target and i['status'] == 'ready'), None)
          print(json.dumps(match))
          ")
            else
              ITEM=$(python parse_items.py --next ${FILTER_ARGS})
            fi
          else
            # BACKLOG.md mode (legacy - deprecated)
            echo "::warning::BACKLOG.md mode is deprecated. Please migrate to GitHub Issues."
            if [ -n "${OVERRIDE_ISSUE_NUMBER}" ]; then
              echo "::error::issue_number parameter only works with use_github_issues=true"
              exit 1
            fi
            ITEM=$(python parse_items.py --next)
          fi

          if [ "${ITEM}" = "null" ] || [ -z "${ITEM}" ]; then
            echo "No eligible item found."
            echo "has_item=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ID=$(echo "${ITEM}" | python -c "import json,sys; print(json.load(sys.stdin)['id'])")
          TITLE=$(echo "${ITEM}" | python -c "import json,sys; print(json.load(sys.stdin)['title'])")

          echo "Picked: ${ID} — ${TITLE}"
          echo "has_item=true" >> "$GITHUB_OUTPUT"
          echo "item_id=${ID}" >> "$GITHUB_OUTPUT"
          echo "item_title=${TITLE}" >> "$GITHUB_OUTPUT"
          {
            echo "item_json<<ITEMJSON_EOF"
            echo "${ITEM}"
            echo "ITEMJSON_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing automated PR
        if: steps.pick.outputs.has_item == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ITEM_ID: ${{ steps.pick.outputs.item_id }}
        run: |
          set -euo pipefail
          EXISTING=$(gh pr list --label automated --state open --search "auto/${ITEM_ID}" --json number --jq '. | length')
          if [ "${EXISTING}" -gt 0 ]; then
            echo "::error::An open automated PR already exists for ${ITEM_ID}. Close or merge it first."
            exit 1
          fi

  check-deps:
    name: Check issue dependencies
    runs-on: ubuntu-latest
    needs: pick-item
    if: needs.pick-item.outputs.has_item == 'true'
    outputs:
      is_blocked:    ${{ steps.check.outputs.is_blocked }}
      blocker_issue: ${{ steps.check.outputs.blocker_issue }}
      blocker_pr:    ${{ steps.check.outputs.blocker_pr }}
      item_issue:    ${{ steps.check.outputs.item_issue }}

    steps:
      - name: Ensure spec:waiting label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "spec:waiting" --color "e99d42" \
            --description "Waiting for a blocking PR to merge" --force 2>/dev/null || true

      - name: Check dependencies
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ITEM_JSON: ${{ needs.pick-item.outputs.item_json }}
        run: |
          ISSUE_NUM=$(echo "$ITEM_JSON" | python3 -c \
            "import json,sys; print(json.load(sys.stdin).get('github_issue_ref','').lstrip('#'))")
          echo "item_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT

          if [ -z "$ISSUE_NUM" ]; then
            echo "is_blocked=false" >> $GITHUB_OUTPUT
            echo "No GitHub issue ref — skipping"
            exit 0
          fi

          BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || echo "")
          BLOCKER=$(echo "$BODY" | python3 -c "
          import re, sys
          m = re.search(r'(?i)(?:depends on|blocked by|requires)\s+#(\d+)', sys.stdin.read())
          print(m.group(1) if m else '')
          ")

          if [ -z "$BLOCKER" ]; then
            echo "is_blocked=false" >> $GITHUB_OUTPUT
            echo "#$ISSUE_NUM: no dependency declared"
            exit 0
          fi

          OPEN_PR=$(gh pr list --search "closes #$BLOCKER" --state open \
            --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$OPEN_PR" ]; then
            echo "is_blocked=true"     >> $GITHUB_OUTPUT
            echo "blocker_issue=$BLOCKER" >> $GITHUB_OUTPUT
            echo "blocker_pr=$OPEN_PR" >> $GITHUB_OUTPUT
            echo "BLOCKED: #$ISSUE_NUM waiting for PR #$OPEN_PR (closes #$BLOCKER)"
            gh issue edit "$ISSUE_NUM" \
              --remove-label "spec:ready" --add-label "spec:waiting" 2>/dev/null || true
          else
            echo "is_blocked=false" >> $GITHUB_OUTPUT
            echo "#$ISSUE_NUM: dependency #$BLOCKER is merged — OK"
          fi

      - name: Notify Discord — issue blocked by open PR
        if: steps.check.outputs.is_blocked == 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          ITEM_ISSUE:    ${{ steps.check.outputs.item_issue }}
          BLOCKER_ISSUE: ${{ steps.check.outputs.blocker_issue }}
          BLOCKER_PR:    ${{ steps.check.outputs.blocker_pr }}
        run: |
          python3 << 'PY'
          import json, os, subprocess, datetime
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if not webhook:
              raise SystemExit(0)
          repo      = os.environ['REPO']
          srv       = os.environ['SERVER_URL']
          item      = os.environ['ITEM_ISSUE']
          b_issue   = os.environ['BLOCKER_ISSUE']
          b_pr      = os.environ['BLOCKER_PR']
          pr_url    = f"{srv}/{repo}/pull/{b_pr}"
          ts        = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          payload   = {"embeds": [{"title": "⏳ Issue waiting for PR review",
              "color": 15105570,
              "fields": [
                  {"name": "Repo",        "value": repo,                                         "inline": True},
                  {"name": "Blocked",     "value": f"#{item}",                                   "inline": True},
                  {"name": "Blocking PR", "value": f"[#{b_pr}]({pr_url}) — closes #{b_issue}", "inline": False},
                  {"name": "Action",      "value": f"Merge PR #{b_pr} to unblock #{item}",       "inline": False}
              ], "timestamp": ts}]}
          subprocess.run(['curl', '-sS', '-X', 'POST', webhook,
                         '-H', 'Content-Type: application/json',
                         '-d', json.dumps(payload)], check=False)
          PY

  implement:
    name: Implement with Claude
    runs-on: ubuntu-latest
    needs: [pick-item, check-deps]
    if: needs.pick-item.outputs.has_item == 'true' && needs.check-deps.outputs.is_blocked != 'true'
    timeout-minutes: 30

    steps:
      - name: Record start time
        id: start-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: SDD — resolve issue number and model
        id: sdd-meta
        env:
          GH_TOKEN: ${{ github.token }}
          ITEM_JSON: ${{ needs.pick-item.outputs.item_json }}
          DEFAULT_MODEL: ${{ inputs.bedrock_model }}
          DOCS_MODEL: ${{ inputs.bedrock_model_docs }}
          COMPLEX_MODEL: ${{ inputs.bedrock_model_complex }}
        run: |
          ISSUE_NUM=$(echo "$ITEM_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('github_issue_ref','').lstrip('#'))")
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels --jq '[.labels[].name]' 2>/dev/null || echo "[]")
          IS_DOCS=$(echo "$LABELS"    | python3 -c "import json,sys; print(str('type:docs'    in json.load(sys.stdin)).lower())")
          IS_COMPLEX=$(echo "$LABELS" | python3 -c "import json,sys; print(str('type:complex' in json.load(sys.stdin)).lower())")
          if [ "$IS_DOCS" = "true" ]; then
            echo "model=$DOCS_MODEL" >> $GITHUB_OUTPUT
          elif [ "$IS_COMPLEX" = "true" ]; then
            echo "model=$COMPLEX_MODEL" >> $GITHUB_OUTPUT
          else
            echo "model=$DEFAULT_MODEL" >> $GITHUB_OUTPUT
          fi
          echo "Resolved: issue=#$ISSUE_NUM  is_docs=$IS_DOCS  is_complex=$IS_COMPLEX"

      - name: Notify Discord - Workflow Started
        id: notify-started
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ITEM_ID: ${{ needs.pick-item.outputs.item_id }}
          ITEM_TITLE: ${{ needs.pick-item.outputs.item_title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PAYLOAD=$(cat << EOF
          {
            "embeds": [{
              "title": "🚀 Auto Maintain Started",
              "description": "Implementing: ${ITEM_TITLE}",
              "color": 3447003,
              "fields": [
                {"name": "Repo", "value": "${REPO}", "inline": true},
                {"name": "Item", "value": "${ITEM_ID}", "inline": true},
                {"name": "Run", "value": "[View workflow run](${RUN_URL})", "inline": false}
              ],
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )

          curl -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            || echo "Discord notification failed, continuing"

      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTO_MAINTAIN_APP_ID }}
          private-key: ${{ secrets.AUTO_MAINTAIN_APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: SDD — mark spec:in-progress
        if: steps.sdd-meta.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue edit ${{ steps.sdd-meta.outputs.issue_number }} \
            --remove-label "spec:ready" \
            --add-label "spec:in-progress" || true

      - name: Build prompt for Claude
        id: prompt
        env:
          ITEM_JSON: ${{ needs.pick-item.outputs.item_json }}
          LANGUAGE: ${{ inputs.language }}
        run: |
          set -euo pipefail
          mkdir -p .auto-maintain
          python <<'PY' > .auto-maintain/prompt.md
          import json, os

          item = json.loads(os.environ["ITEM_JSON"])
          lang = os.environ["LANGUAGE"]

          gates = {
              "python":     "ruff check . && black --check . && pytest -m 'unit or smoke'",
              "typescript": "npm run lint && npm run build && npm test",
              "go":         "golangci-lint run && go build ./... && go test ./..."
          }
          gate_cmd = gates.get(lang, gates["python"])
          closes   = f" · `Closes {item['github_issue_ref']}`" if item.get('github_issue_ref') else ""

          parts = []
          parts.append(f"Implement **{item['id']}**: {item['title']}\n")
          parts.append(f"## Why\n{item['context']}\n")
          parts.append("## Acceptance criteria\n" + "\n".join(f"- {c}" for c in item['acceptance_criteria']) + "\n")

          if item.get('files_to_touch'):
              parts.append("## Files (hints)\n" + "\n".join(f"- `{p}`" for p in item['files_to_touch']) + "\n")
          if item.get('tests_required'):
              parts.append("## Tests\n" + "\n".join(f"- {t}" for t in item['tests_required']) + "\n")
          if item.get('notes'):
              parts.append(f"## Notes\n{item['notes']}\n")

          parts.append(
              f"## Do\n"
              f"1. DDD: map entities + use cases before coding\n"
              f"2. TDD: failing tests first → implement → refactor\n"
              f"3. Gates: `{gate_cmd}` — all must pass\n"
              f"4. Branch `auto/{item['id']}` (already created) · PR title `auto({item['id']}): {item['title']}`\n"
              f"5. PR body: what changed + criteria checkboxes{closes} · labels `automated backlog-driven`\n"
          )

          print("\n".join(parts))
          PY
          echo "prompt_path=.auto-maintain/prompt.md" >> "$GITHUB_OUTPUT"

      - name: Show prompt (always)
        run: cat .auto-maintain/prompt.md

      - name: Dry run — exit before Claude invocation
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run requested. Skipping Claude invocation and PR creation."
          exit 0

      - name: Detect auth method
        id: auth
        env:
          TOKEN: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "use_bedrock=false" >> $GITHUB_OUTPUT
            echo "::notice::Auth: Claude Pro OAuth (CLAUDE_ACCESS_TOKEN)"
          else
            echo "use_bedrock=true" >> $GITHUB_OUTPUT
            echo "::notice::Auth: AWS Bedrock (fallback)"
          fi

      - name: Resolve effective model
        id: effective-model
        run: |
          if [ "${{ inputs.sdd_mode }}" = "true" ] && [ -n "${{ steps.sdd-meta.outputs.model }}" ]; then
            echo "model=${{ steps.sdd-meta.outputs.model }}" >> $GITHUB_OUTPUT
          else
            echo "model=${{ inputs.bedrock_model }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code
        id: claude
        if: ${{ !inputs.dry_run }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          use_bedrock: ${{ steps.auth.outputs.use_bedrock }}
          github_token: ${{ steps.app-token.outputs.token }}
          branch_prefix: 'auto/'
          base_branch: main
          prompt: ${{ steps.prompt.outputs.prompt_path }}
          show_full_output: 'true'
          claude_args: |
            --model ${{ steps.effective-model.outputs.model }}
            --max-turns 40
            --permission-mode acceptEdits
            --allowedTools "Read,Glob,Grep,LS,Edit,Write,MultiEdit,NotebookEdit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(git branch:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git fetch:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr comment:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh label create:*),Bash(ruff:*),Bash(black:*),Bash(pytest:*),Bash(python:*),Bash(python3:*),Bash(pip:*),Bash(pip3:*),Bash(npm:*),Bash(npx:*),Bash(go:*),Bash(golangci-lint:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(mkdir:*),Bash(test:*)"
        env:
          AWS_REGION: ${{ inputs.aws_region }}

      - name: token-usage
        id: token-usage
        if: always()
        env:
          CLAUDE_OUTPUT: ${{ steps.claude.outputs.output }}
        run: |
          python3 << 'PY'
          import json
          import os
          import re

          raw = os.environ.get("CLAUDE_OUTPUT", "")
          input_tokens = 0
          output_tokens = 0

          try:
              data = json.loads(raw)
              usage = data.get("usage", {})
              input_tokens = max(0, int(usage.get("input_tokens", 0)))
              output_tokens = max(0, int(usage.get("output_tokens", 0)))
          except Exception:
              try:
                  m = re.search(r'"input_tokens"\s*:\s*(\d+)', raw)
                  if m:
                      input_tokens = max(0, int(m.group(1)))
                  m = re.search(r'"output_tokens"\s*:\s*(\d+)', raw)
                  if m:
                      output_tokens = max(0, int(m.group(1)))
              except Exception:
                  pass

          cost_raw = (input_tokens / 1_000_000 * 3.00) + (output_tokens / 1_000_000 * 15.00)
          cost = f"${cost_raw:.3f}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"input_tokens={input_tokens}\n")
              fh.write(f"output_tokens={output_tokens}\n")
              fh.write(f"cost={cost}\n")
              fh.write(f"cost_raw={cost_raw}\n")

          print(f"Input tokens:  {input_tokens}")
          print(f"Output tokens: {output_tokens}")
          print(f"Cost:          {cost}")
          PY

      - name: Verify PR was created
        id: verify-pr
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ITEM_ID: ${{ needs.pick-item.outputs.item_id }}
        run: |
          set -euo pipefail

          # Wait a moment for PR to be fully created
          sleep 5

          # Check if PR exists for this item
          PR_COUNT=$(gh pr list --label automated --state open --search "auto/${ITEM_ID}" --json number --jq '. | length')

          if [ "${PR_COUNT}" -eq 0 ]; then
            echo "::error::Expected PR for ${ITEM_ID} was not created. Claude step may have failed or encountered an error."
            echo "::error::Check the Claude Code step output above for details."
            exit 1
          fi

          PR_NUMBER=$(gh pr list --label automated --state open --search "auto/${ITEM_ID}" --json number --jq '.[0].number')
          echo "✅ PR #${PR_NUMBER} successfully created for ${ITEM_ID}"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Calculate duration
        id: calculate-duration
        if: always()
        env:
          START: ${{ steps.start-timer.outputs.start }}
        run: |
          END=$(date +%s)
          SECONDS_ELAPSED=$(( END - START ))
          MINUTES=$(( SECONDS_ELAPSED / 60 ))
          SECS=$(( SECONDS_ELAPSED % 60 ))
          if [ "${MINUTES}" -gt 0 ]; then
            FORMATTED="${MINUTES}m ${SECS}s"
          else
            FORMATTED="${SECS}s"
          fi
          echo "seconds=${SECONDS_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "formatted=${FORMATTED}" >> "$GITHUB_OUTPUT"
          echo "Duration: ${FORMATTED} (${SECONDS_ELAPSED}s)"

      - name: SDD — update issue labels and comment on failure
        if: always() && !inputs.dry_run && steps.sdd-meta.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUM: ${{ steps.sdd-meta.outputs.issue_number }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          PR_OUTCOME: ${{ steps.verify-pr.outcome }}
          PR_NUMBER: ${{ steps.verify-pr.outputs.pr_number }}
          COST: ${{ steps.token-usage.outputs.cost }}
          DURATION: ${{ steps.calculate-duration.outputs.formatted }}
          MODEL: ${{ steps.effective-model.outputs.model }}
          USE_BEDROCK: ${{ steps.auth.outputs.use_bedrock }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$USE_BEDROCK" = "true" ] && AUTH_LABEL="Bedrock" || AUTH_LABEL="Pro OAuth"

          if [ "$CLAUDE_OUTCOME" = "success" ] && [ "$PR_OUTCOME" = "success" ] && [ -n "$PR_NUMBER" ]; then
            gh issue edit "$ISSUE_NUM" \
              --remove-label "spec:in-progress" \
              --add-label "spec:review" || true
          else
            gh issue edit "$ISSUE_NUM" \
              --remove-label "spec:in-progress" \
              --add-label "spec:blocked" 2>/dev/null || true

            if [ "$CLAUDE_OUTCOME" != "success" ]; then
              REASON="Claude terminó con error. Revisa los logs de Actions."
            elif [ -z "$PR_NUMBER" ] || [ "$PR_OUTCOME" != "success" ]; then
              REASON="Claude no creó PR. Posiblemente no hizo commits (spec ambiguo o demasiado grande)."
            else
              REASON="Error desconocido en el workflow."
            fi

            BODY=$(printf '%s\n' \
              "❌ **Implementación fallida**" \
              "" \
              "**Razón:** $REASON" \
              "" \
              "| Campo | Valor |" \
              "|---|---|" \
              "| Modelo | \`$MODEL\` ($AUTH_LABEL) |" \
              "| Costo | $COST |" \
              "| Tiempo | $DURATION |" \
              "| Logs | [Ver en Actions]($RUN_URL) |" \
              "" \
              "Cambia la etiqueta a \`spec:ready\` para reintentar.")

            gh issue comment "$ISSUE_NUM" --body "$BODY" || true
          fi

      - name: Append COSTS.md entry
        if: always()
        continue-on-error: true
        env:
          INPUT_TOKENS: ${{ steps.token-usage.outputs.input_tokens }}
          OUTPUT_TOKENS: ${{ steps.token-usage.outputs.output_tokens }}
          COST: ${{ steps.token-usage.outputs.cost }}
          DURATION: ${{ steps.calculate-duration.outputs.formatted }}
          PR_NUMBER: ${{ steps.verify-pr.outputs.pr_number }}
          ITEM_TITLE: ${{ needs.pick-item.outputs.item_title }}
          ITEM_ID: ${{ needs.pick-item.outputs.item_id }}
          MODEL: ${{ inputs.bedrock_model }}
          JOB_STATUS: ${{ job.status }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import os
          import datetime

          def fmt_int(val):
              try:
                  return f"{int(val):,}"
              except Exception:
                  return "0"

          input_tokens = fmt_int(os.environ.get("INPUT_TOKENS", "0"))
          output_tokens = fmt_int(os.environ.get("OUTPUT_TOKENS", "0"))
          cost = os.environ.get("COST", "$0.000")
          duration = os.environ.get("DURATION", "N/A")
          pr_number = os.environ.get("PR_NUMBER", "").strip()
          item_title = os.environ.get("ITEM_TITLE", "unknown")
          item_id = os.environ.get("ITEM_ID", "unknown")
          model = os.environ.get("MODEL", "unknown")
          job_status = os.environ.get("JOB_STATUS", "unknown")
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          repo = os.environ.get("GITHUB_REPOSITORY", "")

          if pr_number:
              pr_link = f"[#{pr_number}]({server_url}/{repo}/pull/{pr_number})"
          else:
              pr_link = "N/A"

          date_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")

          entry_lines = [
              f"## {date_str} — {item_id} (auto)",
              "",
              f"| Field | Value |",
              f"|-------|-------|",
              f"| Title | {item_title} |",
              f"| Model | {model} |",
              f"| Input tokens | {input_tokens} |",
              f"| Output tokens | {output_tokens} |",
              f"| Cost | {cost} |",
              f"| Duration | {duration} |",
              f"| Status | {job_status} |",
              f"| PR | {pr_link} |",
              "",
          ]
          entry = "\n".join(entry_lines)

          costs_path = "COSTS.md"
          header = "# Claude Session Costs\n\n"

          if not os.path.exists(costs_path):
              with open(costs_path, "w") as fh:
                  fh.write(header)

          with open(costs_path, "a") as fh:
              fh.write(entry + "\n")

          print(f"Appended cost entry to {costs_path}")
          PY

      - name: Commit COSTS.md
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ITEM_ID: ${{ needs.pick-item.outputs.item_id }}
        run: |
          set -euo pipefail
          if [ -f COSTS.md ] && ! git diff --quiet COSTS.md 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            BRANCH="auto/${ITEM_ID}"
            git fetch origin "${BRANCH}" 2>/dev/null || true
            if git rev-parse --verify "origin/${BRANCH}" &>/dev/null; then
              git checkout -B "${BRANCH}" "origin/${BRANCH}"
            fi
            git add COSTS.md
            git commit -m "chore: append COSTS.md session entry"
            git push origin "${BRANCH}"
            echo "✅ Pushed COSTS.md to PR branch ${BRANCH}"
          else
            echo "No changes to COSTS.md or file not found, skipping commit."
          fi

      - name: Notify Discord - Workflow Completed
        id: notify-completed
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ITEM_TITLE: ${{ needs.pick-item.outputs.item_title }}
          DURATION: ${{ steps.calculate-duration.outputs.formatted }}
          COST: ${{ steps.token-usage.outputs.cost }}
          PR_NUMBER: ${{ steps.verify-pr.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -n "${PR_NUMBER}" ]; then
            PR_FIELD="{\"name\": \"PR\", \"value\": \"[#${PR_NUMBER}](${RUN_URL%/actions/runs/*}/pull/${PR_NUMBER})\", \"inline\": false}"
          else
            PR_FIELD="{\"name\": \"PR\", \"value\": \"No PR created\", \"inline\": false}"
          fi

          PAYLOAD=$(cat << EOF
          {
            "embeds": [{
              "title": "✅ Auto Maintain Completed",
              "description": "Successfully implemented: ${ITEM_TITLE}",
              "color": 5763719,
              "fields": [
                {"name": "Repo", "value": "${REPO}", "inline": true},
                {"name": "Duration", "value": "${DURATION}", "inline": true},
                {"name": "Cost", "value": "${COST}", "inline": true},
                ${PR_FIELD}
              ],
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )

          curl -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            || echo "Discord notification failed, continuing"

      - name: Notify Discord - Workflow Failed
        id: notify-failed
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ITEM_TITLE: ${{ needs.pick-item.outputs.item_title }}
          DURATION: ${{ steps.calculate-duration.outputs.formatted }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          VERIFY_PR_OUTCOME: ${{ steps.verify-pr.outcome }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Determine failure reason based on step outcomes
          REASON="Unknown error — check workflow logs"
          if [ "${CLAUDE_OUTCOME}" = "failure" ]; then
            REASON="Claude invocation error (Bedrock)"
          elif [ "${VERIFY_PR_OUTCOME}" = "failure" ]; then
            REASON="PR creation failed"
          fi

          PAYLOAD=$(cat << 'EOF'
          {
            "embeds": [{
              "title": "❌ Auto Maintain Failed",
              "description": "Failed to implement: ${ITEM_TITLE}",
              "color": 15158332,
              "fields": [
                {"name": "Repo", "value": "${REPO}", "inline": true},
                {"name": "Duration", "value": "${DURATION}", "inline": true},
                {"name": "Reason", "value": "${REASON}", "inline": false},
                {"name": "Run", "value": "[View logs](${RUN_URL})", "inline": false}
              ],
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )

          curl -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            || echo "Discord notification failed, continuing"

  monitor-duration:
    name: Monitor long-running sessions
    runs-on: ubuntu-latest
    needs: [pick-item, check-deps]
    if: needs.pick-item.outputs.has_item == 'true' && needs.check-deps.outputs.is_blocked != 'true'
    # Run concurrently with implement job — DO NOT add 'needs: [implement]'

    steps:
      - name: Wait 10 minutes
        run: sleep 600

      - name: Check implement job status via GitHub API
        id: check-status
        run: |
          # Query the current workflow run's jobs
          JOBS_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs")

          IMPLEMENT_STATUS=$(echo "$JOBS_RESPONSE" | jq -r '.jobs[] | select(.name | contains("Implement with Claude")) | .status')
          echo "implement_status=$IMPLEMENT_STATUS" >> $GITHUB_OUTPUT
          echo "Implement job status: $IMPLEMENT_STATUS"

      - name: Send long-running alert to Discord
        if: steps.check-status.outputs.implement_status == 'in_progress'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ITEM_ID: ${{ needs.pick-item.outputs.item_id }}
          ITEM_TITLE: ${{ needs.pick-item.outputs.item_title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PAYLOAD=$(cat << 'EOF'
          {
            "embeds": [{
              "title": "🚨 Long-Running Claude Session",
              "description": "Session duration exceeded 10 minutes",
              "color": 15158332,
              "fields": [
                {"name": "Repo", "value": "${REPO}", "inline": true},
                {"name": "Item", "value": "${ITEM_ID}", "inline": true},
                {"name": "Duration", "value": "10m+ (still running)", "inline": true},
                {"name": "Status", "value": "still running", "inline": true},
                {"name": "Run", "value": "[View workflow run](${RUN_URL})", "inline": false}
              ],
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )

          curl -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            || echo "Discord long-running alert failed, continuing"
