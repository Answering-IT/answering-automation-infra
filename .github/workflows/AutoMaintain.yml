# Bedrock + OIDC), and opens a PR. The PR then goes through Build.yml gates.
#
# Default mode: GitHub Issues (use_github_issues: true)
# Legacy mode: BACKLOG.md (use_github_issues: false, deprecated)
#
# Implementation lives in answering-automation-infra. See:
# https://github.com/Answering-IT/answering-automation-infra

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to implement (leave blank for --next)'
        required: false
      dry_run:
        description: 'Print prompt without invoking Claude'
        type: boolean
        default: false
      

permissions:
  id-token: write       # AWS OIDC
  contents: write       # commit + push
  pull-requests: write  # open PR
  issues: write         # claude-code-action may comment

jobs:
  run:
    uses: Answering-IT/answering-automation-infra/.github/workflows/auto-maintain-reusable.yml@v1.0.5
    with:
      issue_number: ${{ inputs.issue_number }}
      dry_run: ${{ inputs.dry_run }}
      language: python
      bedrock_model: us.anthropic.claude-sonnet-4-6
      # use_github_issues defaults to true (GitHub Issues mode)
      # To use legacy BACKLOG.md mode, set: use_github_issues: false
    secrets:
      AUTO_MAINTAIN_APP_ID: ${{ secrets.AUTO_MAINTAIN_APP_ID }}
      AUTO_MAINTAIN_APP_PRIVATE_KEY: ${{ secrets.AUTO_MAINTAIN_APP_PRIVATE_KEY }}