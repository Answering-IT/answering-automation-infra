name: Setup Repository for Auto-Maintain

# This workflow helps onboard a new repository to use auto-maintain.
# It automates the file setup and provides validation steps.
#
# What it does:
# - Creates AutoMaintain.yml and Build.yml in the target repo
# - Optionally copies Python template files (pyproject.toml, etc.)
# - Creates a setup PR with all the changes
# - Provides instructions for manual steps (secrets, permissions)
#
# What you still need to do manually:
# - Set repository secrets (AUTO_MAINTAIN_APP_ID, AUTO_MAINTAIN_APP_PRIVATE_KEY)
# - Enable "Allow GitHub Actions to create PRs" in repo settings
# - Configure branch protection (optional but recommended)
# - Ensure GitHub App is installed on the target repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (format: Answering-IT/repo-name)'
        required: true
        type: string
      language:
        description: 'Primary language'
        required: true
        type: choice
        options:
          - python
          - typescript
          - go
      copy_templates:
        description: 'Copy language templates (pyproject.toml, requirements-dev.txt, etc.)'
        required: true
        type: boolean
        default: true
      use_github_issues:
        description: 'Use GitHub Issues mode (recommended) vs BACKLOG.md'
        required: true
        type: boolean
        default: true
      workflow_version:
        description: 'Reusable workflow version tag'
        required: true
        type: string
        default: 'v1.0.4'

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    name: Setup target repository
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          if [[ ! "${TARGET_REPO}" =~ ^Answering-IT/.+ ]]; then
            echo "::error::target_repo must be in format 'Answering-IT/repo-name'"
            exit 1
          fi

          REPO_NAME="${TARGET_REPO#Answering-IT/}"
          echo "REPO_NAME=${REPO_NAME}" >> "$GITHUB_ENV"
          echo "Setting up: ${TARGET_REPO}"

      - name: Checkout automation infra (this repo)
        uses: actions/checkout@v4
        with:
          path: infra

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: target

      - name: Create workflow files
        env:
          LANGUAGE: ${{ inputs.language }}
          USE_ISSUES: ${{ inputs.use_github_issues }}
          VERSION: ${{ inputs.workflow_version }}
        run: |
          cd target
          mkdir -p .github/workflows

          # Create AutoMaintain.yml
          cat > .github/workflows/AutoMaintain.yml <<'EOF'
          name: Auto Maintain
          on:
            workflow_dispatch:
              inputs:
                issue_number:
                  description: 'Specific issue number to implement (leave blank for --next)'
                  required: false
                dry_run:
                  description: 'Print prompt without invoking Claude'
                  type: boolean
                  default: false

          permissions:
            id-token: write       # AWS OIDC
            contents: write       # commit + push
            pull-requests: write  # open PR
            issues: write         # claude-code-action may comment

          jobs:
            run:
              uses: Answering-IT/answering-automation-infra/.github/workflows/auto-maintain-reusable.yml@${VERSION}
              with:
                issue_number: ${{ inputs.issue_number }}
                dry_run: ${{ inputs.dry_run }}
                language: ${LANGUAGE}
                bedrock_model: us.anthropic.claude-sonnet-4-6
                use_github_issues: ${USE_ISSUES}
              secrets:
                AUTO_MAINTAIN_APP_ID: ${{ secrets.AUTO_MAINTAIN_APP_ID }}
                AUTO_MAINTAIN_APP_PRIVATE_KEY: ${{ secrets.AUTO_MAINTAIN_APP_PRIVATE_KEY }}
          EOF

          # Create Build.yml based on language
          if [ "${LANGUAGE}" = "python" ]; then
            cat > .github/workflows/Build.yml <<'EOF'
          name: Build
          on:
            pull_request:
              branches: [main]

          permissions:
            id-token: write
            contents: read
            pull-requests: write

          jobs:
            python-gates:
              name: Python Lint & Tests
              uses: Answering-IT/answering-automation-infra/.github/workflows/build-python-reusable.yml@${VERSION}
          EOF
          elif [ "${LANGUAGE}" = "typescript" ]; then
            cat > .github/workflows/Build.yml <<'EOF'
          name: Build
          on:
            pull_request:
              branches: [main]

          permissions:
            contents: read

          jobs:
            typescript-gates:
              name: TypeScript Lint & Build
              uses: Answering-IT/answering-automation-infra/.github/workflows/build-typescript-reusable.yml@${VERSION}
          EOF
          elif [ "${LANGUAGE}" = "go" ]; then
            cat > .github/workflows/Build.yml <<'EOF'
          name: Build
          on:
            pull_request:
              branches: [main]

          permissions:
            contents: read

          jobs:
            go-gates:
              name: Go Lint & Tests
              uses: Answering-IT/answering-automation-infra/.github/workflows/build-go-reusable.yml@${VERSION}
          EOF
          fi

          echo "✅ Workflow files created"
          ls -la .github/workflows/

      - name: Copy language templates
        if: ${{ inputs.copy_templates }}
        env:
          LANGUAGE: ${{ inputs.language }}
        run: |
          cd target

          if [ -f pyproject.toml ] || [ -f package.json ] || [ -f go.mod ]; then
            echo "::warning::Project files already exist. Skipping template copy to avoid overwriting."
            echo "::warning::Manually merge templates from infra/templates/${LANGUAGE}/ if needed."
            exit 0
          fi

          echo "Copying ${LANGUAGE} templates..."
          cp -v ../infra/templates/${LANGUAGE}/* . 2>/dev/null || echo "No templates for ${LANGUAGE} or already exist"

      - name: Create BACKLOG.md if needed
        if: ${{ !inputs.use_github_issues && inputs.language == 'python' }}
        run: |
          cd target
          if [ ! -f BACKLOG.md ]; then
            cp ../infra/templates/python/BACKLOG.md .
            echo "✅ Created BACKLOG.md"
          else
            echo "BACKLOG.md already exists, skipping"
          fi

      - name: Create setup PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          LANGUAGE: ${{ inputs.language }}
        run: |
          cd target

          git config user.name "auto-maintain-setup"
          git config user.email "noreply@github.com"

          BRANCH="setup-auto-maintain-$(date +%s)"
          git checkout -b "${BRANCH}"

          git add .github/workflows/
          [ "${{ inputs.copy_templates }}" = "true" ] && git add -A . || true

          if git diff --cached --quiet; then
            echo "::error::No changes to commit. Files may already exist."
            exit 1
          fi

          git commit -m "chore: setup auto-maintain pipeline

          This PR sets up the auto-maintain workflow for this repository.

          ## What's included
          - AutoMaintain.yml workflow (manual trigger)
          - Build.yml workflow (runs on PRs)
          ${{ inputs.copy_templates == 'true' && format('- {0} project templates', inputs.language) || '' }}

          ## Manual steps required

          Before you can use auto-maintain, complete these steps:

          ### 1. Set repository secrets
          \`\`\`bash
          gh secret set AUTO_MAINTAIN_APP_ID --body \"<APP_ID>\" -R ${TARGET_REPO}
          gh secret set AUTO_MAINTAIN_APP_PRIVATE_KEY -R ${TARGET_REPO} < /path/to/key.pem
          \`\`\`

          ### 2. Verify GitHub App permissions
          - Go to https://github.com/settings/apps/answering-auto-maintain/permissions
          - Ensure these are set to **Read and write**:
            - Contents
            - Issues
            - Pull requests
            - Workflows (⚠️ Required for modifying workflow files)

          ### 3. Install GitHub App on this repo
          - Go to https://github.com/apps/answering-auto-maintain
          - Click Configure, select this repository

          ### 4. Enable PR creation in Actions settings
          - Go to https://github.com/${TARGET_REPO}/settings/actions
          - Check \"Allow GitHub Actions to create and approve pull requests\"

          ### 5. (Optional) Configure branch protection
          - Go to https://github.com/${TARGET_REPO}/settings/branches
          - Add protection rule for \`main\` requiring PR reviews and status checks

          ## Testing

          After completing manual steps:
          \`\`\`bash
          # Dry run (no Claude invocation)
          gh workflow run AutoMaintain.yml -f dry_run=true -R ${TARGET_REPO}

          # Full run (creates PR if backlog item exists)
          gh workflow run AutoMaintain.yml -R ${TARGET_REPO}
          \`\`\`

          ## Documentation
          - Complete setup guide: https://github.com/Answering-IT/answering-automation-infra/blob/main/docs/COMPLETE-SETUP-GUIDE.md
          - Troubleshooting: https://github.com/Answering-IT/answering-automation-infra/blob/main/docs/TROUBLESHOOTING.md"

          git push -u origin "${BRANCH}"

          gh pr create \
            --repo "${TARGET_REPO}" \
            --title "Setup auto-maintain pipeline" \
            --body-file <(git log -1 --format=%B) \
            --base main \
            --head "${BRANCH}"

          echo "✅ Setup PR created successfully!"
          gh pr view --repo "${TARGET_REPO}"

      - name: Print next steps
        run: |
          echo "
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ✅ Setup PR created for ${{ inputs.target_repo }}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Next steps (see PR description for details):

          1. Review the PR and merge it
          2. Set repository secrets (APP_ID and PRIVATE_KEY)
          3. Verify GitHub App permissions include Workflows: Read+Write
          4. Enable 'Allow GitHub Actions to create PRs' in repo settings
          5. Test with dry run: gh workflow run AutoMaintain.yml -f dry_run=true

          Complete guide:
          https://github.com/Answering-IT/answering-automation-infra/blob/main/docs/COMPLETE-SETUP-GUIDE.md
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          "
